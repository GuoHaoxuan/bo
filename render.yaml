# Render Blueprint —— 一键部署「波」的前端(静态站) + 后端(常驻 WebSocket)。
# 用法：Render(render.com) → New → Blueprint → 选 GuoHaoxuan/bo → Apply。
services:
  # 后端：常驻 WebSocket 进程（权威节拍循环 + 服务端 AI）
  - type: web
    runtime: node
    name: bo-server
    plan: free
    region: singapore # 亚洲玩家就近，延迟最低；改区域需重建服务（见 README）
    buildCommand: pnpm install
    startCommand: pnpm --filter @bo/server start

  # 前端：Vite 打包出的静态站
  - type: web
    runtime: static
    name: bo-client
    buildCommand: pnpm install && pnpm --filter @bo/client build
    staticPublishPath: apps/client/dist
    envVars:
      # 部署后在 bo-client → Environment 里把它设成后端地址（设完会自动重建）：
      #   VITE_WS_URL = wss://bo-server-xxxx.onrender.com
      # 静态站的地址必须在构建期写入，所以这一步手动设一次。
      - key: VITE_WS_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
